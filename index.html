<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه ورزشی اسپرت ۹۰</title>
    <style>
        /* ===== متغیرهای رنگ (تم روشن و تاریک) ===== */
        :root {
            /* رنگ‌های اصلی */
            --primary-color: #e94560;
            --primary-dark: #c73652;
            
            /* تم روشن (Light Mode) */
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --bg-card: #f8f9fa;
            --bg-hover: #fce4e8;
            --bg-info: #f1f3f6;
            --bg-table-header: #16213e;
            
            --text-primary: #1a1a2e;
            --text-secondary: #16213e;
            --text-muted: #6c757d;
            --text-white: #ffffff;
            
            --border-color: #e9ecef;
            --shadow-color: rgba(0, 0, 0, 0.08);
            
            --stock-available-bg: #d4edda;
            --stock-available-text: #155724;
            --stock-unavailable-bg: #f8d7da;
            --stock-unavailable-text: #721c24;
        }
        
        /* ===== تم تاریک (Dark Mode) ===== */
        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --bg-card: #2d2d2d;
            --bg-hover: #3d1a24;
            --bg-info: #2a2a2a;
            --bg-table-header: #2d2d2d;
            
            --text-primary: #e4e4e4;
            --text-secondary: #f0f0f0;
            --text-muted: #a0a0a0;
            --text-white: #ffffff;
            
            --border-color: #3d3d3d;
            --shadow-color: rgba(0, 0, 0, 0.3);
            
            --stock-available-bg: #1a3a2a;
            --stock-available-text: #8fdfb0;
            --stock-unavailable-bg: #3a1a1a;
            --stock-unavailable-text: #df8f8f;
        }
        
        /* ===== استایل کلی ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--bg-container);
            border-radius: 16px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px var(--shadow-color);
            min-height: 80vh;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        
        /* ===== هدر ===== */
        .header {
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 28px;
            color: var(--text-secondary);
        }
        
        .header h1 span {
            color: var(--primary-color);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .badge {
            background-color: var(--primary-color);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* ===== دکمه دارک مود ===== */
        .theme-toggle {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--text-primary);
            font-size: 22px;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: var(--bg-container);
        }
        
        .theme-toggle:hover {
            background-color: var(--primary-color);
            color: white;
            transform: scale(1.05);
        }
        
        .theme-toggle .icon {
            font-size: 18px;
        }
        
        /* ===== دکمه بازگشت ===== */
        .back-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            background-color: var(--bg-hover);
        }
        
        .back-btn.hidden {
            display: none;
        }
        
        /* ===== دسته‌بندی‌ها (صفحه اصلی) ===== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .category-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            color: var(--text-primary);
        }
        
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-color);
            border-color: var(--primary-color);
        }
        
        .category-card .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        
        .category-card .name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-secondary);
        }
        
        .category-card .count {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        /* ===== زیردسته‌ها ===== */
        .subcategories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .subcategory-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            color: var(--text-primary);
        }
        
        .subcategory-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-color);
            border-color: var(--primary-color);
        }
        
        .subcategory-card .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }
        
        .subcategory-card .name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .subcategory-card .count {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* ===== لیست محصولات ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .product-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            color: var(--text-primary);
        }
        
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-color);
            border-color: var(--primary-color);
        }
        
        .product-card .product-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .product-card .product-price {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 8px 0;
        }
        
        .product-card .product-stock {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
        }
        
        .product-card .product-stock.available {
            background-color: var(--stock-available-bg);
            color: var(--stock-available-text);
        }
        
        .product-card .product-stock.unavailable {
            background-color: var(--stock-unavailable-bg);
            color: var(--stock-unavailable-text);
        }
        
        .product-card .product-code {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        /* ===== صفحه جزئیات محصول ===== */
        .product-detail {
            padding: 20px 0;
        }
        
        .product-detail .detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .product-detail .detail-emoji {
            font-size: 64px;
        }
        
        .product-detail .detail-name {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-secondary);
        }
        
        .product-detail .detail-price {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .product-detail .detail-info {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            margin: 15px 0;
        }
        
        .product-detail .detail-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .product-detail .detail-info .info-row:last-child {
            border-bottom: none;
        }
        
        .product-detail .detail-info .label {
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .product-detail .detail-info .value {
            color: var(--text-primary);
        }
        
        .product-detail .detail-description {
            background: var(--bg-info);
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            line-height: 1.8;
            color: var(--text-primary);
        }
        
        .product-detail .order-btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .product-detail .order-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }
        
        .section-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-secondary);
            margin: 20px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title .emoji {
            font-size: 28px;
        }
        
        /* ===== فوتر ===== */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .footer .contact {
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        /* ===== صفحه - مخفی کردن بخش‌ها ===== */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .info-box {
            background-color: var(--bg-info);
            border-right: 5px solid var(--primary-color);
            padding: 16px 22px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        /* ===== اسکرول برای موبایل ===== */
        .table-wrapper {
            overflow-x: auto;
        }
        
        /* ===== واکنش‌گرایی ===== */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
            
            .categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            .subcategories-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .category-card {
                padding: 20px 15px;
            }
            
            .category-card .emoji {
                font-size: 36px;
            }
            
            .product-detail .detail-header {
                flex-direction: column;
                text-align: center;
            }
            
            .product-detail .detail-price {
                font-size: 26px;
            }
            
            .footer {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
            
            .theme-toggle {
                font-size: 18px;
                padding: 4px 12px;
            }
        }
        
        @media print {
            .container {
                box-shadow: none;
                padding: 20px;
            }
            body {
                background: white;
            }
            .category-card, .subcategory-card, .product-card {
                cursor: default;
            }
            .product-detail .order-btn {
                display: none;
            }
            .theme-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ===== هدر ===== -->
    <div class="header">
        <h1>🏋️ <span>اسپرت ۹۰</span></h1>
        <div class="header-actions">
            <div class="badge">بروزرسانی: تیر ۱۴۰۵</div>
            <button class="theme-toggle" id="themeToggle" onclick="app.toggleTheme()">
                <span class="icon" id="themeIcon">🌙</span>
                <span id="themeLabel">تاریک</span>
            </button>
        </div>
    </div>
    
    <!-- ===== دکمه بازگشت ===== -->
    <button class="back-btn hidden" onclick="app.goBack()">← بازگشت</button>
    
    <!-- ============================================================ -->
    <!-- ===== صفحه ۱: دسته‌بندی‌های اصلی ===== -->
    <!-- ============================================================ -->
    <div id="page-main" class="page active">
        <div class="info-box">
            <span>📋 لطفاً یک دسته‌بندی را انتخاب کنید</span>
        </div>
        <div class="categories-grid" id="categoriesContainer">
            <!-- توسط app ساخته می‌شود -->
        </div>
    </div>
    
    <!-- ============================================================ -->
    <!-- ===== صفحه ۲: زیردسته‌ها ===== -->
    <!-- ============================================================ -->
    <div id="page-sub" class="page">
        <h2 class="section-title" id="subCategoryTitle">
            <span class="emoji">📂</span> زیردسته‌ها
        </h2>
        <div class="subcategories-grid" id="subcategoriesContainer">
            <!-- توسط app ساخته می‌شود -->
        </div>
    </div>
    
    <!-- ============================================================ -->
    <!-- ===== صفحه ۳: لیست محصولات ===== -->
    <!-- ============================================================ -->
    <div id="page-products" class="page">
        <h2 class="section-title" id="productsTitle">
            <span class="emoji">📦</span> محصولات
        </h2>
        <div class="products-grid" id="productsContainer">
            <!-- توسط app ساخته می‌شود -->
        </div>
    </div>
    
    <!-- ============================================================ -->
    <!-- ===== صفحه ۴: جزئیات محصول ===== -->
    <!-- ============================================================ -->
    <div id="page-detail" class="page">
        <div class="product-detail" id="productDetailContainer">
            <!-- توسط app ساخته می‌شود -->
        </div>
    </div>
    
    <!-- ===== فوتر ===== -->
    <div class="footer">
        <span class="contact">📞 @ziaei_1405  برای سفارش به این آیدی در ایتا پیام دهید</span>
        <span>eataa.com/sport_90_isfahan</span>
    </div>
    
</div>

<script>
    // ================================================================
    //  کلاس Product - نماینده یک محصول
    // ================================================================
    class Product {
        constructor({ name, price, stock = true, code, brand, description, specifications = {} }) {
            this.name = name;
            this.price = price;
            this.stock = stock;
            this.code = code || this.generateCode(name);
            this.brand = brand || 'نامشخص';
            this.description = description || 'توضیحی برای این محصول ثبت نشده است.';
            this.specifications = specifications;
        }
        
        generateCode(name) {
            return 'P' + Date.now().toString().slice(-6) + Math.floor(Math.random() * 100);
        }
        
        getFormattedPrice() {
            return new Intl.NumberFormat('fa-IR').format(this.price);
        }
        
        getStockStatus() {
            return this.stock ? 'موجود' : 'ناموجود';
        }
        
        getStockClass() {
            return this.stock ? 'available' : 'unavailable';
        }
        
        getStockEmoji() {
            return this.stock ? '✅' : '❌';
        }
    }
    
    // ================================================================
    //  کلاس Subcategory - نماینده یک زیردسته
    // ================================================================
    class Subcategory {
        constructor({ id, name, emoji, products = [] }) {
            this.id = id;
            this.name = name;
            this.emoji = emoji || '📦';
            this.products = products.map(p => new Product(p));
        }
        
        getAvailableCount() {
            return this.products.filter(p => p.stock).length;
        }
        
        getTotalCount() {
            return this.products.length;
        }
        
        addProduct(productData) {
            this.products.push(new Product(productData));
        }
    }
    
    // ================================================================
    //  کلاس Category - نماینده یک دسته‌بندی اصلی
    // ================================================================
    class Category {
        constructor({ id, name, emoji, subcategories = [] }) {
            this.id = id;
            this.name = name;
            this.emoji = emoji || '📂';
            this.subcategories = subcategories.map(s => new Subcategory(s));
        }
        
        getTotalProducts() {
            return this.subcategories.reduce((sum, sub) => sum + sub.getTotalCount(), 0);
        }
        
        getSubcategory(id) {
            return this.subcategories.find(s => s.id === id);
        }
    }
    
    // ================================================================
    //  کلاس App - مدیریت کل برنامه
    // ================================================================
    class App {
        constructor() {
            this.categories = [];
            this.historyStack = [];
            this.currentCategory = null;
            this.currentSubcategory = null;
            this.currentProduct = null;
            this.theme = 'light';
            
            this.initData();
            this.loadTheme();
            this.initUI();
        }
        
        // ------------------------------------------------------------
        //  مقداردهی اولیه داده‌ها (اینجا قیمت‌ها رو تعریف کنید)

                                { name: 'توپ فوتبال مدل پرو', price: 850000, stock: true, brand: 'آدیداس', description: 'توپ فوتبال حرفه‌ای با کیفیت بالا مناسب مسابقات' },
                                { name: 'توپ فوتبال مدل استاندارد', price: 420000, stock: true, brand: 'نایکی', description: 'توپ فوتبال استاندارد برای تمرینات روزانه' },
                                { name: 'توپ فوتبال مدل تمرینی', price: 280000, stock: false, brand: 'آندر آرمور' }
                            ]
                        },
                        {
                            id: 'shin-guard',
                            name: 'ساق‌بند',
                            emoji: '🛡️',

                                { name: 'ساق‌بند حرفه‌ای', price: 320000, stock: false, brand: 'نایکی' },
                                { name: 'ساق‌بند استاندارد', price: 180000, stock: true, brand: 'آدیداس' }
                            ]
                        },
                        {
                            id: 'gloves',

                            emoji: '🧤',
                            products: [
                                { name: 'دستکش دروازه‌بانی حرفه‌ای', price: 580000, stock: true, brand: 'ریوش' },
                                { name: 'دستکش دروازه‌بانی تمرینی', price: 350000, stock: true, brand: 'آدیداس' }
                            ]
                        }
                    ]
                }),
                new Category({
                    id: 'basketball',

                    subcategories: [
                        {
                            id: 'basketball-ball',

                            products: [
                                { name: 'توپ بسکتبال سایز ۷', price: 620000, stock: true, brand: 'اسپالدینگ' },

                        {

                                { name: 'حلقه بسکتبال دیواری', price: 980000, stock: false, brand: 'گلوری' }
                            ]
                        }
                    ]
                }),
                new Category({
                    id: 'fitness',
                    name: 'بدنسازی',
                    emoji: '🏋️',
                    subcategories: [
                        {
                            id: 'dumbbell',
                            name: 'دمبل',
                            emoji: '🏋️',
                            products: [
                                { name: 'دمبل ۵ کیلویی (جفت)', price: 780000, stock: true, brand: 'بادی‌کرفت' },
                                { name: 'دمبل ۱۰ کیلویی (جفت)', price: 1350000, stock: true, brand: 'بادی‌کرفت' },
                                { name: 'دمبل ۱۵ کیلویی (جفت)', price: 1850000, stock: false, brand: 'بادی‌کرفت' }
                            ]
                        },
                        {
                            id: 'barbell',
                            name: 'هالتر',
                            emoji: '🏋️',
                            products: [
                                { name: 'هالتر ۲۰ کیلویی', price: 2200000, stock: false, brand: 'بادی‌کرفت' },
                                { name: 'هالتر ۳۰ کیلویی', price: 3200000, stock: true, brand: 'بادی‌کرفت' }
                            ]

        // ------------------------------------------------------------
        //  مدیریت تم (دارک/روشن)
        // ------------------------------------------------------------
        loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            this.setTheme(savedTheme);
        }
        
        setTheme(theme) {
            this.theme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            
            if (theme === 'dark') {
                icon.textContent = '☀️';
                label.textContent = 'روشن';
            } else {
                icon.textContent = '🌙';
                label.textContent = 'تاریک';
            }
        }
        
        toggleTheme() {
            const newTheme = this.theme === 'light' ? 'dark' : 'light';
            this.setTheme(newTheme);
        }
        
        // ------------------------------------------------------------
        //  مقداردهی اولیه UI
        // ------------------------------------------------------------
        initUI() {
            this.renderMainPage();
            this.showPage('page-main');
        }
        
        // ------------------------------------------------------------
        //  مدیریت صفحات
        // ------------------------------------------------------------
        showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            const backBtn = document.querySelector('.back-btn');
            if (pageId === 'page-main') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }
        }
        
        goBack() {
            if (this.historyStack.length === 0) return;
            const lastPage = this.historyStack.pop();
            
            if (lastPage === 'page-main') {
                this.showPage('page-main');
            } else if (lastPage === 'page-sub') {
                this.showPage('page-sub');
                if (this.currentCategory) {
                    this.renderSubcategories(this.currentCategory);
                }
            } else if (lastPage === 'page-products') {
                this.showPage('page-products');
                if (this.currentSubcategory) {
                    this.renderProducts(this.currentSubcategory);
                }
            } else if (lastPage === 'page-detail') {
                this.showPage('page-products');
                if (this.currentSubcategory) {
                    this.renderProducts(this.currentSubcategory);
                }
            }
        }
        
        // ------------------------------------------------------------
        //  رندر صفحه اصلی (دسته‌بندی‌ها)
        // ------------------------------------------------------------
        renderMainPage() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = '';
            
            this.categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <span class="emoji">${cat.emoji}</span>
                    <div class="name">${cat.name}</div>
                    <div class="count">${cat.subcategories.length} زیردسته</div>
                `;
                card.onclick = () => this.selectCategory(cat.id);
                container.appendChild(card);
            });
        }
        
        // ------------------------------------------------------------
        //  انتخاب دسته‌بندی → نمایش زیردسته‌ها
        // ------------------------------------------------------------
        selectCategory(categoryId) {
            this.currentCategory = this.categories.find(c => c.id === categoryId);
            if (!this.currentCategory) return;
            
            this.historyStack.push('page-main');
            this.showPage('page-sub');
            this.renderSubcategories(this.currentCategory);
        }
        
        renderSubcategories(category) {
            document.getElementById('subCategoryTitle').innerHTML = `
                <span class="emoji">${category.emoji}</span>
                ${category.name} - زیردسته‌ها
            `;
            
            const container = document.getElementById('subcategoriesContainer');
            container.innerHTML = '';
            
            category.subcategories.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'subcategory-card';
                card.innerHTML = `
                    <span class="emoji">${sub.emoji}</span>
                    <div class="name">${sub.name}</div>
                    <div class="count">${sub.getTotalCount()} محصول • ${sub.getAvailableCount()} موجود</div>
                `;
                card.onclick = () => this.selectSubcategory(sub.id);
                container.appendChild(card);
            });
        }
        
        // ------------------------------------------------------------
        //  انتخاب زیردسته → نمایش محصولات
        // ------------------------------------------------------------
        selectSubcategory(subcategoryId) {
            this.currentSubcategory = this.currentCategory.getSubcategory(subcategoryId);
            if (!this.currentSubcategory) return;
            
            this.historyStack.push('page-sub');
            this.showPage('page-products');
            this.renderProducts(this.currentSubcategory);
        }
        
        renderProducts(subcategory) {
            document.getElementById('productsTitle').innerHTML = `
                <span class="emoji">${subcategory.emoji}</span>
                ${subcategory.name} - لیست قیمت
            `;
            
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            
            if (subcategory.getTotalCount() === 0) {
                container.innerHTML = `<p style="color:var(--text-muted); padding:30px; text-align:center;">هیچ محصولی در این دسته وجود ندارد</p>`;
                return;
            }
            
            subcategory.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">${product.getFormattedPrice()} تومان</div>
                    <span class="product-stock ${product.getStockClass()}">${product.getStockEmoji()} ${product.getStockStatus()}</span>
                    <div class="product-code">کد: ${product.code}</div>
                `;
                card.onclick = () => this.showProductDetail(product);
                container.appendChild(card);
            });
        }
        
        // ------------------------------------------------------------
        //  نمایش جزئیات یک محصول (صفحه اختصاصی)
        // ------------------------------------------------------------
        showProductDetail(product) {
            this.currentProduct = product;
            this.historyStack.push('page-products');
            this.showPage('page-detail');
            
            const container = document.getElementById('productDetailContainer');
            
            const specs = [
                { label: 'برند', value: product.brand },
                { label: 'کد محصول', value: product.code },
                { label: 'وضعیت موجودی', value: product.getStockStatus() },
            ];
            
            container.innerHTML = `
                <div class="detail-header">
                    <div class="detail-emoji">${this.currentSubcategory ? this.currentSubcategory.emoji : '📦'}</div>
                    <div style="flex:1;">
                        <div class="detail-name">${product.name}</div>
                        <div style="color:var(--text-muted); font-size:14px;">${this.currentSubcategory ? this.currentSubcategory.name : ''}</div>
                    </div>
                    <div class="detail-price">${product.getFormattedPrice()} تومان</div>
                </div>
                
                <div class="detail-info">
                    ${specs.map(s => `
                        <div class="info-row">
                            <span class="label">${s.label}</span>
                            <span class="value">${s.value}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="detail-description">
                    <strong>📝 توضیحات:</strong><br>
                    ${product.description}
                </div>
                
                <div style="text-align: center; margin-top: 20px;">
                    <a href="https://eataa.com/sport_90_isfahan" target="_blank" class="order-btn">
                        🛒 ثبت سفارش
                    </a>
                </div>
                
                <div style="text-align: center; margin-top: 15px; color:var(--text-muted); font-size: 14px;">
                    برای ثبت سفارش، روی دکمه بالا کلیک کنید و کد محصول را در پیام بنویسید
                </div>
            `;
        }
    }
    
    // ================================================================
    //  اجرای برنامه
    // ================================================================
    const app = new App();
</script>
